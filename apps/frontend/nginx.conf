server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss image/svg+xml;

    # The backend is deployed as a SEPARATE Coolify application (not a
    # docker-compose service), so it has no Docker-internal hostname this
    # container can resolve — proxy to its public URL instead (a real,
    # always-resolvable public domain, unlike the old internal-only name
    # that made nginx fail to start and crash-loop the whole container).
    # The Host header must stay api.sahaledu.com so Coolify's edge proxy
    # routes the request to the right app; the original tenant subdomain
    # the visitor requested is preserved in X-Forwarded-Host for the
    # backend's tenant middleware to read.
    location /api/ {
        proxy_pass https://api.sahaledu.com/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.sahaledu.com;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
